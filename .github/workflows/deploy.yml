name: Deploy (Cloudflare Pages)

on:
  push:
    branches: [main] # auto-deploy production on merge to main
  workflow_dispatch: # plus manual "Run workflow" button

permissions:
  contents: read

concurrency: # never run two deploys at once; newest wins
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:web # runs typecheck, then `vite build` → dist/
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # production branch (main) → production; any other branch → preview deployment
          command: pages deploy dist --project-name=elecxarium --branch=${{ github.ref_name }}
